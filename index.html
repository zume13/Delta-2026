<!doctype html>
<html lang="en" class="dark w-dvw h-dvh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.png" />
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">

  <body class="bg-(--white) dark:bg-(--black)">
    <nav class="hidden

                bg-(--white) dark:bg-(--dblack)/60 opacity-90
                dark:text-(--white) text-(--black)
                border-b border-gray-700
                ">
      <div class="ml-[15%] 
                  text-lg font-bold
                  md:text-xl 
                  lg:text-3xl">
        <a href="#">DELTA.DEV</a>
      </div>
      <div class="flex left-0 gap-x-10 items-center max-w-fit mr-[10%]
                  text-md font-medium
                  md:text-lg
                  lg:2xl">
        <a href="about" class="relative
                      after:absolute
                      after:left-0
                      after:bottom-0
                      after:h-0.5
                      after:w-0
                      dark:after:bg-(--white)
                      after:bg-(--black)
                      after:transition-all
                      after:duration-300
                      hover:after:w-full">
          About Me
        </a>
        <a href="#proj" class="relative
                      after:absolute
                      after:left-0
                      after:bottom-0
                      after:h-0.5
                      after:w-0

                      after:transition-all
                      after:duration-300
                      hover:after:w-full">

        </a>
        <a href="#contact" class="relative
                      after:absolute
                      after:left-0
                      after:bottom-0
                      after:h-0.5
                      after:w-0
                      dark:after:bg-(--white)
                      after:bg-(--black)
                      after:transition-all
                      after:duration-300
                      hover:after:w-full">
          Contact
        </a>
        <button id="themeButton" class="p-1 w-[10%] border rounded-lg cursor-pointer ">
          <img id="themeImage" src="/src/assets/light.png" alt="" class="w-15">
        </button>
      </div>
    </nav>

    <section class="flex flex-col px-7 lg:px-20 min-w-dvw min-h-[90dvh] items-center justify-center gap-[5%] dark:text-(--white) text-(--black) 
                    mt-[10dvh]
                    md:flex-row">
      <div class="flex items-center gap-15 
                  flex-col">
        <p class="text-6xl font-bold text-wrap font-space text-center
                  md:text-6xl
                  lg:text-8xl">Full Stack Engineer</p>
        <p class="text-center font-inter text-lg
                  sm:text-xl
                  md:text-2xl
                  lg:text-3xl">Crafting high-performance applications with modern tech stacks. Specialized in building scalable systems, reactive UIs, and cloud-native solutions.</p>
        <div class="flex justify-center gap-[5%] w-full
                    sm:
                    md:flex-row">
          <button id="explore" class="flex justify-center items-center max-w-[30%] rounded-2xl border dark:border-white border-black py-4 grow cursor-pointer
                       dark:bg-white dark:text-black bg-black text-white font-bold text-center
                       hover:scale-105 duration-300 hover:shadow-[0_0_20px_rgba(59,130,246,0.7),0_0_40px_rgba(59,130,246,0.6)]
                        text-lg
                        md:text-lg
                        lg:text-xl">
                  My Works <span class="pl-3 text-4xl">&rarr;</span> 
          </button>
          <button id="learn" class="flex justify-center items-center max-w-[20%] rounded-2xl border  py-4 grow cursor-pointer

                        text-lg
                        md:text-base
                        lg:text-xl">
            Learn More
          </button>
        </div>
      </div>
        <img class="w-[70%] mt-10
                    sm:flex sm:w-[50%] sm:mt-10
                    md:w-[40%] 
                    lg:w-[33%] 
                    rounded-4xl border-2 dark:border-white
                    hover:-translate-y-4
                    shadow-[0_0_20px_rgba(59,130,246,0.4),0_0_40px_rgba(59,130,246,0.6)]
                    hover:shadow-[0_0_35px_rgba(59,130,246,0.7),0_0_60px_rgba(59,130,246,0.6)]
                    transition-all duration-300" 
                    src="/src/assets/picture.jpg" alt="">
    </section>

    <footer>

    </footer>

    <script type="module" src="/src/main.ts"></script>
